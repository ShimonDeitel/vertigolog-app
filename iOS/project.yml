name: Vertigo Log
options:
  bundleIdPrefix: com.shimondeitel.vertigolog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Vertigo Log:
    type: application
    platform: iOS
    sources:
      - path: Vertigo Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vertigolog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Vertigo Log/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Vertigo LogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Vertigo LogTests
      - path: Vertigo Log.storekit
    dependencies:
      - target: Vertigo Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vertigolog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Vertigo LogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Vertigo LogUITests
    dependencies:
      - target: Vertigo Log
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vertigolog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Vertigo Log:
    build:
      targets:
        Vertigo Log: all
        Vertigo LogTests: [test]
        Vertigo LogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Vertigo Log.storekit
    test:
      config: Debug
      storeKitConfiguration: Vertigo Log.storekit
      targets:
        - Vertigo LogTests
        - Vertigo LogUITests
    archive:
      config: Release
